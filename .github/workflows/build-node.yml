name: Node build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - docs/**
      - examples/**
      - .github/**
      - '!.github/workflows/build-node.yml'

  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - docs/**
      - examples/**
      - .github/**
      - '!.github/workflows/build-node.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        node-version:
          - '18.x'
          - '20.x'
          - '22.x'
          - '24.x'

    runs-on:
      - ubuntu-latest

    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install, build, lint, test
        run: |
          npm ci
          npm run build
          npm test
          npm run lint
